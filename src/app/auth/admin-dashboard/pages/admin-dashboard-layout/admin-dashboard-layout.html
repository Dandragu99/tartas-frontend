<!-- admin-dashboard-layout.html -->
<div class="flex h-screen bg-slate-950 text-slate-300 antialiased overflow-hidden">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0 h-full">

    <!-- Logo -->
    <div class="px-6 py-5 border-b border-slate-800">
      <h1 class="text-xl font-bold text-white cursor-pointer" routerLink="/">
        Ana's <span class="text-pink-400">Bakery</span>
      </h1>
      <p class="text-xs text-slate-500 mt-0.5">Panel de administración</p>
    </div>

    <!-- Perfil -->
    <div class="px-6 py-4 border-b border-slate-800 flex items-center gap-3">
      <div class="rounded-full w-9 h-9 ring-2 ring-pink-400/30
                  bg-pink-500/20 flex items-center justify-center">
        <span class="text-sm font-bold text-pink-400">
          {{ user()?.nombre?.charAt(0)?.toUpperCase() }}
        </span>
      </div>

      <div>
        <p class="text-xs text-slate-500">Bienvenid@,</p>
        <p class="text-sm font-semibold text-white">{{user()?.nombre}}</p>
      </div>
    </div>

    <!-- Navegación -->
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">

      <a routerLink="/admin/dashboard"
        routerLinkActive="bg-pink-500/10 text-pink-400 border-pink-500/30"
        [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg border border-transparent
               text-slate-400 hover:text-white hover:bg-slate-800 transition-all duration-150">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
        </svg>
        <div>
          <p class="text-sm font-semibold leading-tight">Dashboard</p>
          <p class="text-xs text-slate-500">Vista general</p>
        </div>
      </a>

      <a routerLink="/catalogo"
        routerLinkActive="bg-pink-500/10 text-pink-400 border-pink-500/30"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg border border-transparent
               text-slate-400 hover:text-white hover:bg-slate-800 transition-all duration-150">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" />
        </svg>
        <div>
          <p class="text-sm font-semibold leading-tight">Catálogo cliente</p>
          <p class="text-xs text-slate-500">Listado de productos</p>
        </div>
      </a>

    </nav>

    <!-- Cerrar sesión -->
    <div class="px-3 py-4 border-t border-slate-800">
      <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400
                     hover:text-red-400 hover:bg-red-400/5 transition-all duration-150 text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
        </svg>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="flex-1 overflow-y-auto">
    <!-- Header top bar -->
    <header class="sticky top-0 z-10 bg-slate-950/80 backdrop-blur border-b border-slate-800 px-8 py-4 flex items-center justify-between">
      <div>
        <p class="text-xs text-slate-500 uppercase tracking-widest">Admin</p>
      </div>
      <a routerLink="/" class="text-xs text-slate-500 hover:text-pink-400 transition flex items-center gap-1">
        ← Volver a la web
      </a>
    </header>

    <div class="px-8 py-6">
      <router-outlet />
    </div>
  </main>

</div>
