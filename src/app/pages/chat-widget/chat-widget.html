<button (click)="toggleChat()"
  class="fixed bottom-6 right-6 z-50 w-16 h-16 rounded-full bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 text-2xl shadow-xl transition-all duration-200 flex flex-col items-center justify-center gap-0.5">
  @if (open) {
  <span class="text-zinc-300 text-xl">✕</span>
  } @else {
  <span>🎂</span>
  <span class="text-[9px] font-bold text-amber-400 tracking-widest leading-none">IA</span>
  }
</button>

@if (open) {
<div
  class="fixed bottom-28 right-6 z-50 w-80 h-115 bg-zinc-900 rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-zinc-700">

  <div class="bg-zinc-800 border-b border-zinc-700 px-4 py-3 flex items-center gap-3">
    <div class="relative">
      <span class="text-2xl">🎂</span>
      <span
        class="absolute -top-1 -right-2 bg-amber-400 text-zinc-900 text-[8px] font-black px-1 rounded leading-tight">IA</span>
    </div>
    <div>
      <p class="font-semibold text-sm text-white">Asistente IA · Ana's Bakery</p>
      <p class="text-xs text-zinc-400">Pregúntame qué tarta quieres 🎂</p>
    </div>
    <div class="ml-auto flex items-center gap-1">
      <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
      <span class="text-xs text-zinc-500">online</span>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto p-3 space-y-2 bg-zinc-900">
    @for (msg of mensajes; track $index) {
    <div [class]="msg.tipo === 'user' ? 'flex justify-end' : 'flex justify-start'">
      <div
        [class]="msg.tipo === 'user'
              ? 'bg-amber-400 text-zinc-900 font-medium rounded-2xl rounded-br-sm px-3 py-2 text-sm max-w-[75%]'
              : 'bg-zinc-800 text-zinc-100 rounded-2xl rounded-bl-sm px-3 py-2 text-sm max-w-[75%] border border-zinc-700'">
        {{ msg.texto }}
      </div>
    </div>
    }

    @if (cargando) {
    <div class="flex justify-start">
      <div class="bg-zinc-800 border border-zinc-700 rounded-2xl rounded-bl-sm px-4 py-3">
        <p class="text-xs text-zinc-400 mb-1">La IA está pensando...</p>
        <span class="flex gap-1 items-center">
          <span class="w-2 h-2 bg-amber-400 rounded-full animate-bounce [animation-delay:0ms]"></span>
          <span class="w-2 h-2 bg-amber-400 rounded-full animate-bounce [animation-delay:150ms]"></span>
          <span class="w-2 h-2 bg-amber-400 rounded-full animate-bounce [animation-delay:300ms]"></span>
        </span>
      </div>
    </div>

    }
  </div>

  <div class="p-3 border-t border-zinc-700 flex gap-2 bg-zinc-800">
    <input [(ngModel)]="input" (keyup.enter)="enviar()" [disabled]="cargando" placeholder="¿Qué tarta quieres?"
      class="flex-1 text-sm bg-zinc-900 border border-zinc-600 text-zinc-100 placeholder-zinc-500 rounded-full px-4 py-2 focus:outline-none focus:border-amber-400 disabled:opacity-50" />
    <button (click)="enviar()" [disabled]="cargando"
      class="w-9 h-9 bg-amber-400 hover:bg-amber-300 disabled:opacity-50 text-zinc-900 font-bold rounded-full flex items-center justify-center transition-colors">
      ➤
    </button>
  </div>

</div>
}
